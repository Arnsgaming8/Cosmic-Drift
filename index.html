<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cosmic Drift</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: #030308;
            font-family: 'Orbitron', sans-serif;
            cursor: crosshair;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #gameCanvas { display: block; position: fixed; top: 0; left: 0; }
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(3, 3, 8, 0.8) 100%);
            z-index: 10;
        }
        .hud {
            position: fixed; z-index: 20; color: #c8d4e3; font-size: 12px; letter-spacing: 1px;
            pointer-events: auto;
        }
        .hud-panel {
            background: rgba(13, 27, 42, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(123, 104, 238, 0.3);
            border-radius: 8px;
            padding: 15px 20px;
            padding-top: 35px;
            box-shadow: 0 0 20px rgba(123, 104, 238, 0.1), inset 0 0 20px rgba(0, 0, 0, 0.3);
        }
        .hud-top-left { top: 20px; left: 20px; pointer-events: auto; }
        .hud-label { color: #7b68ee; font-size: 10px; text-transform: uppercase; margin-bottom: 2px; }
        .hud-value {
            font-family: 'Share Tech Mono', monospace; font-size: 18px;
            color: #00ffcc; text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }
        .hud-row { margin-bottom: 12px; }
        .hud-row:last-child { margin-bottom: 0; }
        .pause-btn {
            position: absolute; top: 10px; right: 10px;
            width: 28px; height: 28px;
            background: rgba(123, 104, 238, 0.3);
            border: 1px solid rgba(123, 104, 238, 0.5);
            border-radius: 4px;
            cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: background 0.2s;
            z-index: 30;
        }
        .pause-btn:hover { background: rgba(123, 104, 238, 0.5); }
        .pause-btn::before, .pause-btn::after {
            content: ''; width: 4px; height: 12px;
            background: #c8d4e3; border-radius: 1px; margin: 0 2px;
        }
        .minimap {
            position: fixed; bottom: 20px; right: 20px;
            width: 150px; height: 150px; border-radius: 50%;
            background: rgba(13, 27, 42, 0.7);
            border: 1px solid rgba(123, 104, 238, 0.4);
            box-shadow: 0 0 30px rgba(123, 104, 238, 0.2), inset 0 0 30px rgba(0, 0, 0, 0.5);
            z-index: 20; overflow: hidden;
            pointer-events: auto;
        }
        .minimap canvas { width: 100%; height: 100%; }
        .controls-hint {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 20; text-align: center;
            color: rgba(200, 212, 227, 0.6); font-size: 11px; letter-spacing: 2px;
        }
        .title-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100;
            background: radial-gradient(ellipse at center, rgba(26, 10, 46, 0.9) 0%, rgba(3, 3, 8, 0.98) 100%);
            cursor: pointer;
        }
        .title-screen h1 {
            font-size: clamp(36px, 8vw, 72px); font-weight: 700;
            color: #fff;
            text-shadow: 0 0 40px rgba(0, 255, 204, 0.6), 0 0 80px rgba(123, 104, 238, 0.4);
            letter-spacing: 8px; margin-bottom: 20px;
            animation: titlePulse 3s ease-in-out infinite;
        }
        .title-screen .subtitle {
            font-size: 14px; color: #7b68ee; letter-spacing: 6px; margin-bottom: 60px;
        }
        .title-screen .start-prompt {
            font-size: 16px; color: #c8d4e3; letter-spacing: 3px;
            animation: blink 2s ease-in-out infinite;
        }
        .paused-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 90; background: rgba(3, 3, 8, 0.7);
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
            cursor: pointer;
        }
        .paused-overlay.visible { opacity: 1; pointer-events: all; }
        .paused-overlay h2 {
            font-size: 48px; color: #c8d4e3; letter-spacing: 10px;
            text-shadow: 0 0 30px rgba(123, 104, 238, 0.5);
        }
        .hidden { display: none !important; }
        @keyframes titlePulse {
            0%, 100% { text-shadow: 0 0 40px rgba(0, 255, 204, 0.6), 0 0 80px rgba(123, 104, 238, 0.4); }
            50% { text-shadow: 0 0 60px rgba(0, 255, 204, 0.8), 0 0 120px rgba(123, 104, 238, 0.6); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @media (max-width: 768px), (pointer: coarse) {
            .desktop-controls { display: none !important; }
            .mobile-controls { display: inline !important; }
        }
        .mobile-controls { display: none; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="vignette"></div>

    <div class="title-screen" id="titleScreen">
        <h1>COSMIC DRIFT</h1>
        <div class="subtitle">AN INFINITE JOURNEY</div>
        <div class="start-prompt">TAP OR PRESS SPACE TO LAUNCH</div>
    </div>

    <div class="paused-overlay" id="pausedOverlay">
        <div style="text-align: center;">
            <h2>PAUSED</h2>
            <div style="color: rgba(200,212,227,0.5); font-size: 12px; margin-top: 20px; letter-spacing: 2px;">CLICK OR TAP TO RESUME</div>
        </div>
    </div>

    <div class="hud hud-top-left hud-panel" id="hud">
        <div class="pause-btn" id="pauseBtn"></div>
        <div class="hud-row">
            <div class="hud-label">Velocity</div>
            <div class="hud-value" id="velocity">0</div>
        </div>
        <div class="hud-row">
            <div class="hud-label">Coordinates</div>
            <div class="hud-value" id="coordinates">0, 0</div>
        </div>
        <div class="hud-row">
            <div class="hud-label">Artifacts</div>
            <div class="hud-value" id="artifacts">0</div>
        </div>
    </div>

    <div class="minimap" id="minimap">
        <canvas id="minimapCanvas"></canvas>
    </div>

    <div class="controls-hint" id="controlsHint">
        <span class="desktop-controls">WASD or ARROWS to move &bull; MOUSE to aim &bull; SHIFT to boost</span>
        <span class="mobile-controls">TOUCH to aim & thrust &bull; TWO FINGERS to boost</span>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const minimapCanvas = document.getElementById('minimapCanvas');
        const minimapCtx = minimapCanvas.getContext('2d');

        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        minimapCanvas.width = 150;
        minimapCanvas.height = 150;

        let gameState = 'title';
        const keys = {};
        let mouseX = width / 2, mouseY = height / 2;
        let lastTime = 0;
        let hintFadeStarted = false;

        const ship = { x: 0, y: 0, vx: 0, vy: 0, angle: 0, targetAngle: 0, thrust: 0, boosting: false };
        const camera = { x: 0, y: 0 };
        const worldSize = 100000;

        const stars = [];
        const nebulae = [];
        const artifacts = [];
        const particles = [];
        const warpLines = [];

        let artifactCount = 0;
        const screenShake = { x: 0, y: 0, intensity: 0 };

        function generateStars() {
            for (let layer = 0; layer < 3; layer++) {
                const count = 200 + layer * 150;
                const sizeRange = layer === 0 ? [0.5, 1.5] : layer === 1 ? [1, 2.5] : [1.5, 3.5];
                const speedMult = layer === 0 ? 0.1 : layer === 1 ? 0.3 : 0.6;
                const brightness = layer === 0 ? 0.3 : layer === 1 ? 0.6 : 1;
                for (let i = 0; i < count; i++) {
                    stars.push({
                        x: (Math.random() - 0.5) * worldSize,
                        y: (Math.random() - 0.5) * worldSize,
                        size: sizeRange[0] + Math.random() * (sizeRange[1] - sizeRange[0]),
                        twinkle: Math.random() * Math.PI * 2,
                        twinkleSpeed: 0.5 + Math.random() * 2,
                        layer,
                        speedMult,
                        brightness,
                        color: ['#ffffff', '#ffe4c4', '#add8e6'][Math.floor(Math.random() * 3)]
                    });
                }
            }
        }

        function generateNebulae() {
            for (let i = 0; i < 15; i++) {
                nebulae.push({
                    x: (Math.random() - 0.5) * worldSize * 0.8,
                    y: (Math.random() - 0.5) * worldSize * 0.8,
                    radius: 300 + Math.random() * 500,
                    color1: Math.random() > 0.5 ? '#1a0a2e' : '#0d1b2a',
                    color2: Math.random() > 0.5 ? '#2d1b4e' : '#1a3a5c',
                    opacity: 0.15 + Math.random() * 0.2,
                    rotation: Math.random() * Math.PI * 2,
                    rotationSpeed: (Math.random() - 0.5) * 0.0002
                });
            }
        }

        function spawnArtifact() {
            const angle = Math.random() * Math.PI * 2;
            const dist = 200 + Math.random() * 600;
            artifacts.push({
                x: ship.x + Math.cos(angle) * dist,
                y: ship.y + Math.sin(angle) * dist,
                radius: 15,
                pulse: Math.random() * Math.PI * 2
            });
        }

        function spawnNearbyArtifact() {
            const angle = Math.random() * Math.PI * 2;
            const dist = 150 + Math.random() * 300;
            artifacts.push({
                x: ship.x + Math.cos(angle) * dist,
                y: ship.y + Math.sin(angle) * dist,
                radius: 15,
                pulse: Math.random() * Math.PI * 2
            });
        }

        let lastArtifactSpawnPos = { x: 0, y: 0 };
        let distanceSinceLastSpawn = 0;

        function spawnInitialArtifacts() {
            for (let i = 0; i < 20; i++) spawnArtifact();
            lastArtifactSpawnPos.x = ship.x;
            lastArtifactSpawnPos.y = ship.y;
        }

        function updateShip(dt) {
            const acceleration = ship.boosting ? 800 : 400;
            const friction = 0.98;
            const maxSpeed = ship.boosting ? 500 : 250;

            ship.targetAngle = Math.atan2(mouseY - height / 2, mouseX - width / 2);
            let angleDiff = ship.targetAngle - ship.angle;
            while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
            while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
            ship.angle += angleDiff * 5 * dt;

            ship.thrust = 0;
            if (keys['KeyW'] || keys['ArrowUp'] || keys['Space']) {
                ship.vx += Math.cos(ship.angle) * acceleration * dt;
                ship.vy += Math.sin(ship.angle) * acceleration * dt;
                ship.thrust = 1;
            }
            if (keys['KeyS'] || keys['ArrowDown']) {
                ship.vx -= Math.cos(ship.angle) * acceleration * 0.5 * dt;
                ship.vy -= Math.sin(ship.angle) * acceleration * 0.5 * dt;
            }
            if (keys['KeyA'] || keys['ArrowLeft']) {
                ship.vx -= Math.cos(ship.angle - Math.PI / 2) * acceleration * 0.5 * dt;
                ship.vy -= Math.sin(ship.angle - Math.PI / 2) * acceleration * 0.5 * dt;
            }
            if (keys['KeyD'] || keys['ArrowRight']) {
                ship.vx += Math.cos(ship.angle - Math.PI / 2) * acceleration * 0.5 * dt;
                ship.vy += Math.sin(ship.angle - Math.PI / 2) * acceleration * 0.5 * dt;
            }

            const speed = Math.sqrt(ship.vx * ship.vx + ship.vy * ship.vy);
            if (speed > maxSpeed) {
                ship.vx = (ship.vx / speed) * maxSpeed;
                ship.vy = (ship.vy / speed) * maxSpeed;
            }

            ship.vx *= friction;
            ship.vy *= friction;
            ship.x += ship.vx * dt;
            ship.y += ship.vy * dt;
            ship.x = Math.max(-worldSize / 2, Math.min(worldSize / 2, ship.x));
            ship.y = Math.max(-worldSize / 2, Math.min(worldSize / 2, ship.y));

            camera.x = ship.x - width / 2;
            camera.y = ship.y - height / 2;

            if (ship.thrust > 0 && Math.random() > 0.5) {
                const tailAngle = ship.angle + Math.PI + (Math.random() - 0.5) * 0.5;
                particles.push({
                    x: ship.x - Math.cos(ship.angle) * 20,
                    y: ship.y - Math.sin(ship.angle) * 20,
                    vx: Math.cos(tailAngle) * 50 + (Math.random() - 0.5) * 30,
                    vy: Math.sin(tailAngle) * 50 + (Math.random() - 0.5) * 30,
                    life: 1,
                    size: 3 + Math.random() * 3,
                    color: ship.boosting ? '#00ffcc' : '#7b68ee'
                });
            }

            if (ship.boosting && ship.thrust > 0 && Math.random() > 0.7) {
                warpLines.push({
                    x: ship.x + (Math.random() - 0.5) * width,
                    y: ship.y + (Math.random() - 0.5) * height,
                    length: 50 + Math.random() * 100,
                    angle: ship.angle + Math.PI / 2,
                    life: 1
                });
            }

            const dx = ship.x - lastArtifactSpawnPos.x;
            const dy = ship.y - lastArtifactSpawnPos.y;
            distanceSinceLastSpawn += Math.sqrt(dx * dx + dy * dy);
            lastArtifactSpawnPos.x = ship.x;
            lastArtifactSpawnPos.y = ship.y;

            if (distanceSinceLastSpawn > 400) {
                distanceSinceLastSpawn = 0;
                if (artifacts.length < 40) spawnNearbyArtifact();
                else if (Math.random() > 0.5) spawnNearbyArtifact();
            }

            while (artifacts.length < 25) spawnArtifact();
        }

        function updateArtifacts(dt) {
            for (let i = artifacts.length - 1; i >= 0; i--) {
                const art = artifacts[i];
                art.pulse += dt * 3;
                const dx = ship.x - art.x;
                const dy = ship.y - art.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < art.radius + 20) {
                    artifactCount++;
                    artifacts.splice(i, 1);
                    screenShake.intensity = 10;
                    for (let j = 0; j < 20; j++) {
                        const angle = (Math.PI * 2 / 20) * j;
                        particles.push({
                            x: art.x, y: art.y,
                            vx: Math.cos(angle) * 100 + (Math.random() - 0.5) * 50,
                            vy: Math.sin(angle) * 100 + (Math.random() - 0.5) * 50,
                            life: 1, size: 4 + Math.random() * 4, color: '#ff6b35'
                        });
                    }
                }
            }
        }

        function updateParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.life -= dt * 2;
                if (p.life <= 0) particles.splice(i, 1);
            }
            for (let i = warpLines.length - 1; i >= 0; i--) {
                warpLines[i].life -= dt * 3;
                if (warpLines[i].life <= 0) warpLines.splice(i, 1);
            }
            if (screenShake.intensity > 0) {
                screenShake.x = (Math.random() - 0.5) * screenShake.intensity;
                screenShake.y = (Math.random() - 0.5) * screenShake.intensity;
                screenShake.intensity *= 0.9;
                if (screenShake.intensity < 0.5) {
                    screenShake.intensity = 0;
                    screenShake.x = 0;
                    screenShake.y = 0;
                }
            }
        }

        function render() {
            ctx.fillStyle = '#030308';
            ctx.fillRect(0, 0, width, height);
            ctx.save();
            ctx.translate(screenShake.x, screenShake.y);

            for (const neb of nebulae) {
                const screenX = neb.x - camera.x;
                const screenY = neb.y - camera.y;
                if (screenX < -neb.radius * 2 || screenX > width + neb.radius * 2 ||
                    screenY < -neb.radius * 2 || screenY > height + neb.radius * 2) continue;
                neb.rotation += neb.rotationSpeed;
                ctx.save();
                ctx.translate(screenX, screenY);
                ctx.rotate(neb.rotation);
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, neb.radius);
                gradient.addColorStop(0, neb.color1);
                gradient.addColorStop(0.5, neb.color2);
                gradient.addColorStop(1, 'transparent');
                ctx.globalAlpha = neb.opacity;
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.ellipse(0, 0, neb.radius, neb.radius * 0.6, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            for (const line of warpLines) {
                ctx.save();
                ctx.translate(line.x - camera.x, line.y - camera.y);
                ctx.rotate(line.angle);
                ctx.strokeStyle = `rgba(0, 255, 204, ${line.life * 0.5})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(-line.length / 2, 0);
                ctx.lineTo(line.length / 2, 0);
                ctx.stroke();
                ctx.restore();
            }

            for (const star of stars) {
                const parallax = 1 - star.speedMult;
                const screenX = (star.x - camera.x * parallax + width * 5) % (width + 200) - 100;
                const screenY = (star.y - camera.y * parallax + height * 5) % (height + 200) - 100;
                const twinkle = Math.sin(star.twinkle) * 0.3 + 0.7;
                star.twinkle += star.twinkleSpeed * 0.016;
                ctx.globalAlpha = star.brightness * twinkle;
                ctx.fillStyle = star.color;
                ctx.beginPath();
                ctx.arc(screenX, screenY, star.size, 0, Math.PI * 2);
                ctx.fill();
                if (star.layer === 2 && star.brightness > 0.8) {
                    ctx.globalAlpha = star.brightness * twinkle * 0.3;
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, star.size * 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            ctx.globalAlpha = 1;

            for (const art of artifacts) {
                const screenX = art.x - camera.x;
                const screenY = art.y - camera.y;
                if (screenX < -50 || screenX > width + 50 || screenY < -50 || screenY > height + 50) continue;
                const pulse = Math.sin(art.pulse) * 0.3 + 1;
                const glowSize = art.radius * 2 * pulse;
                ctx.globalAlpha = 0.3;
                const glowGradient = ctx.createRadialGradient(screenX, screenY, 0, screenX, screenY, glowSize);
                glowGradient.addColorStop(0, '#ff6b35');
                glowGradient.addColorStop(1, 'transparent');
                ctx.fillStyle = glowGradient;
                ctx.beginPath();
                ctx.arc(screenX, screenY, glowSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.fillStyle = '#ff6b35';
                ctx.beginPath();
                ctx.arc(screenX, screenY, art.radius * pulse, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(screenX, screenY, art.radius * 0.4 * pulse, 0, Math.PI * 2);
                ctx.fill();
            }

            for (const p of particles) {
                const screenX = p.x - camera.x;
                const screenY = p.y - camera.y;
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(screenX, screenY, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.globalAlpha = 1;

            const shipScreenX = width / 2;
            const shipScreenY = height / 2;
            ctx.save();
            ctx.translate(shipScreenX, shipScreenY);
            ctx.rotate(ship.angle);

            if (ship.thrust > 0) {
                ctx.globalAlpha = 0.6;
                const engineGlow = ctx.createRadialGradient(-25, 0, 0, -25, 0, 30);
                engineGlow.addColorStop(0, ship.boosting ? '#00ffcc' : '#7b68ee');
                engineGlow.addColorStop(1, 'transparent');
                ctx.fillStyle = engineGlow;
                ctx.beginPath();
                ctx.arc(-25, 0, 30, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            ctx.fillStyle = '#00ffcc';
            ctx.shadowColor = '#00ffcc';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.moveTo(25, 0);
            ctx.lineTo(-15, -12);
            ctx.lineTo(-10, 0);
            ctx.lineTo(-15, 12);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.restore();
            ctx.restore();
        }

        function renderMinimap() {
            minimapCtx.clearRect(0, 0, 150, 150);
            const scale = 150 / 600;
            minimapCtx.fillStyle = 'rgba(26, 10, 46, 0.5)';
            minimapCtx.beginPath();
            minimapCtx.arc(75, 75, 70, 0, Math.PI * 2);
            minimapCtx.fill();
            for (const art of artifacts) {
                const relX = (art.x - ship.x) * scale;
                const relY = (art.y - ship.y) * scale;
                if (Math.sqrt(relX * relX + relY * relY) < 70) {
                    minimapCtx.fillStyle = '#ff6b35';
                    minimapCtx.beginPath();
                    minimapCtx.arc(75 + relX, 75 + relY, 3, 0, Math.PI * 2);
                    minimapCtx.fill();
                }
            }
            minimapCtx.fillStyle = '#00ffcc';
            minimapCtx.shadowColor = '#00ffcc';
            minimapCtx.shadowBlur = 5;
            minimapCtx.beginPath();
            minimapCtx.arc(75, 75, 4, 0, Math.PI * 2);
            minimapCtx.fill();
            minimapCtx.shadowBlur = 0;
        }

        function updateHUD() {
            const speed = Math.sqrt(ship.vx * ship.vx + ship.vy * ship.vy);
            document.getElementById('velocity').textContent = Math.round(speed);
            document.getElementById('coordinates').textContent = `${Math.round(ship.x)}, ${Math.round(ship.y)}`;
            document.getElementById('artifacts').textContent = artifactCount;
        }

        function gameLoop(timestamp) {
            const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
            lastTime = timestamp;
            if (gameState === 'playing') {
                updateShip(dt);
                updateArtifacts(dt);
                updateParticles(dt);
                render();
                renderMinimap();
                updateHUD();
                if (!hintFadeStarted && (ship.thrust > 0 || Math.sqrt(ship.vx ** 2 + ship.vy ** 2) > 10)) {
                    hintFadeStarted = true;
                    setTimeout(() => {
                        document.getElementById('controlsHint').style.transition = 'opacity 3s ease';
                        document.getElementById('controlsHint').style.opacity = '0';
                    }, 3000);
                }
            }
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            gameState = 'playing';
            document.getElementById('titleScreen').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('minimap').style.display = 'block';
        }

        function togglePause() {
            if (gameState === 'playing') {
                gameState = 'paused';
                document.getElementById('pausedOverlay').classList.add('visible');
            } else if (gameState === 'paused') {
                gameState = 'playing';
                document.getElementById('pausedOverlay').classList.remove('visible');
            }
        }

        document.getElementById('pauseBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            e.preventDefault();
            togglePause();
        });
        document.getElementById('pauseBtn').addEventListener('touchstart', (e) => {
            e.stopPropagation();
            e.preventDefault();
            togglePause();
        });

        document.getElementById('pausedOverlay').addEventListener('click', togglePause);
        document.getElementById('pausedOverlay').addEventListener('touchstart', (e) => {
            e.preventDefault();
            togglePause();
        });

        function handleResize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', handleResize);

        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space') startGame();
            if (e.code === 'Escape') togglePause();
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') ship.boosting = true;
        });

        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') ship.boosting = false;
        });

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        document.getElementById('titleScreen').addEventListener('click', startGame);
        document.getElementById('titleScreen').addEventListener('touchstart', (e) => {
            e.preventDefault();
            startGame();
        });

        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameState === 'title') return;
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            if (e.touches.length === 1) {
                keys['KeyW'] = true;
                ship.thrust = 1;
            } else if (e.touches.length === 2) {
                ship.boosting = true;
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (e.touches.length === 0) {
                keys['KeyW'] = false;
                ship.thrust = 0;
                ship.boosting = false;
            } else if (e.touches.length === 1) {
                ship.boosting = false;
            }
        }, { passive: false });

        document.addEventListener('visibilitychange', () => {
            if (document.hidden && gameState === 'playing') togglePause();
        });

        document.getElementById('hud').style.display = 'none';
        document.getElementById('minimap').style.display = 'none';

        generateStars();
        generateNebulae();
        spawnInitialArtifacts();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
